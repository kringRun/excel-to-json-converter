
# 创建GitHub Actions工作流文件
github_workflow = '''name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "Excel转JSON工具" excel_to_json_converter.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: Excel转JSON工具
        path: dist/*.exe
'''

with open('/mnt/kimi/output/build.yml', 'w', encoding='utf-8') as f:
    f.write(github_workflow)

print("✅ GitHub Actions 工作流文件已创建: build.yml")
print("\n请将此文件放入仓库的 .github/workflows/ 目录下")
